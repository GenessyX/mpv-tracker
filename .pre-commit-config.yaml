ci:
  autoupdate_schedule: weekly
  skip: []
  submodules: false

exclude: docs|node_modules|migrations|.git|.tox
fail_fast: false

default_language_version:
  python: python3.12

default_install_hook_types:
  - pre-commit
  - commit-msg

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^.*\.md$
      - id: end-of-file-fixer
        exclude: ^.*snapshots.*$
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: check-merge-conflict
      - id: check-yaml
        name: Check YAML
        exclude: ^charts/|^helm/

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.12
    hooks:
      - id: uv-export
        args: ["--format", "requirements-txt", "--no-hashes", "--frozen", "--output-file", ".uv-requirements.txt", "--group", "tests"]
        always_run: true

  - repo: https://github.com/GenessyX/validate-mypy-deps
    rev: v0.2.0
    hooks:
      - id: validate-mypy-deps
        always_run: true
        args: ["-r", ".uv-requirements.txt"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.19.1'  # Use the sha / tag you want to point at
    hooks:
      - id: mypy
        args: [--strict]
        additional_dependencies:
          - attrs==26.1.0
          - colorama==0.4.6 ; sys_platform == 'win32'
          - cyclopts==4.10.0
          - docstring-parser==0.17.0
          - docutils==0.22.4
          - iniconfig==2.3.0
          - linkify-it-py==2.1.0
          - markdown-it-py==4.0.0
          - mdit-py-plugins==0.5.0
          - mdurl==0.1.2
          - packaging==26.0
          - pillow==12.2.0
          - platformdirs==4.9.4
          - pluggy==1.6.0
          - pygments==2.19.2
          - pytest==9.0.2
          - rich==14.3.3
          - rich-pixels==3.0.1
          - rich-rst==1.3.2
          - textual==8.2.2
          - typing-extensions==4.15.0
          - uc-micro-py==2.0.0
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.24.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-angular']
